<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Penguin's blogs</title>
    <link rel="stylesheet" href="style.css">
    <script>
        (function() {
            const savedTheme = localStorage.getItem('theme') || 'dark';
            document.documentElement.setAttribute('data-theme', savedTheme);
            if (savedTheme === 'dark') {
                document.documentElement.classList.add('dark');
            } else {
                document.documentElement.classList.remove('dark');
            }
        })();
    </script>
    <script src="theme.js" defer></script>
</head>
<body>
    <canvas id="snow"></canvas>
    <div class="container">
        <nav>
            <a href="../index.html">Penguin</a>
            <a href="index.html">/blogs</a>
            <button class="theme-toggle" id="theme-toggle" data-no-transition="true" aria-label="Toggle Theme"></button>
        </nav>

        <h1>thatarcticpenguin's blogs</h1>

        <div class="blogs-grid">

            <a href="intro.html" class="blog-link">
                <div class="blog-card">
                    <div class="blog-image">
                        <img src="https://www.themarketingsage.com/wp-content/uploads/2015/08/about-me-leon-severan-we-buy-houses.jpg" alt="About me">
                    </div>
                    <div class="blog-content">
                        <div class="blog-title">
                            <span class="bullet">•</span>Just about me
                        </div>
                        <div class="blog-subtitle">introducing myself</div>
                        <div class="blog-meta">
                            <span class="blog-date">Jan 22, 2025</span>
                        </div>
                        <div class="blog-tags">
                            <span class="tag">about</span>
                            <span class="tag">dev</span>
                            <span class="tag">life</span>
                        </div>
                    </div>
                </div>
            </a>

            <a href="http.html" class="blog-link">
                <div class="blog-card">
                    <div class="blog-image">
                        <img src="https://images.unsplash.com/photo-1558494949-ef010cbdcc31?w=500" alt="HTTP Server">
                    </div>
                    <div class="blog-content">
                        <div class="blog-title">
                            <span class="bullet">•</span>I built a tiny HTTP server in Python
                        </div>
                        <div class="blog-subtitle">Built a HTTP server and learnt abt TCP and HTTP routing</div>
                        <div class="blog-meta">
                            <span class="blog-date">Jan 26, 2026</span>
                        </div>
                        <div class="blog-tags">
                            <span class="tag">http</span>
                            <span class="tag">networking</span>
                            <span class="tag">tcpip</span>
                            <span class="tag">learnstuff</span>
                        </div>
                    </div>
                </div>
            </a>
        </div>
    </div>
    <script>
    const canvas = document.getElementById("snow");
    const ctx = canvas.getContext("2d");

    let width, height;
    let snowflakes = [];

    function resize() {
        width = canvas.width = window.innerWidth;
        height = canvas.height = window.innerHeight;
    }
    window.addEventListener("resize", resize);
    resize();

    function createSnowflakes(count = 120) {
        snowflakes = [];
        for (let i = 0; i < count; i++) {
            snowflakes.push({
                x: Math.random() * width,
                y: Math.random() * height,
                r: Math.random() * 2 + 0.5,   // tiny circles
                d: Math.random() * 1 + 0.5    // fall speed
            });
        }
    }
    createSnowflakes();

    function draw() {
        ctx.clearRect(0, 0, width, height);
        const theme = document.documentElement.getAttribute('data-theme') || 'dark';
        ctx.fillStyle = theme === 'dark' ? "rgba(255, 255, 255, 0.9)" : "rgba(100, 100, 100, 0.5)";
        ctx.beginPath();

        for (let flake of snowflakes) {
            ctx.moveTo(flake.x, flake.y);
            ctx.arc(flake.x, flake.y, flake.r, 0, Math.PI * 2);
        }

        ctx.fill();
        move();
    }

    function move() {
        for (let flake of snowflakes) {
            flake.y += flake.d;
            flake.x += Math.sin(flake.y * 0.01) * 0.3;

            if (flake.y > height) {
                flake.y = -5;
                flake.x = Math.random() * width;
            }
        }
    }

    function animate() {
        draw();
        requestAnimationFrame(animate);
    }
    animate();
    </script>
</body>
</html>
